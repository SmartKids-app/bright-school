<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Gallery | Bright Future Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">

  <header class="glass-nav sticky top-0 z-50 border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="text-indigo-600 font-bold">&larr; Back to Home</a>
      <h1 class="text-xl font-extrabold">Media Archive</h1>
      <div class="w-20"></div> </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-12">
    <section class="mb-12 bg-white p-6 rounded-[2rem] shadow-sm flex flex-wrap gap-4 items-center justify-between">
      <div class="flex flex-wrap gap-4 flex-1">
        <input type="text" placeholder="Search events (e.g. Graduation)..." class="flex-1 min-w-[250px] bg-slate-100 border-none rounded-xl px-6 py-3 focus:ring-2 focus:ring-indigo-500 outline-none">
        <select class="bg-slate-100 border-none rounded-xl px-6 py-3 outline-none focus:ring-2 focus:ring-indigo-500 text-slate-600 font-medium">
          <option>Filter by Year</option>
          <option>2026</option>
          <option>2025</option>
        </select>
        <select class="bg-slate-100 border-none rounded-xl px-6 py-3 outline-none focus:ring-2 focus:ring-indigo-500 text-slate-600 font-medium">
          <option>All Media</option>
          <option>Photos</option>
          <option>Videos</option>
        </select>
      </div>
      <button class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Apply Filters</button>
    </section>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 group">
        <div class="relative h-60 bg-slate-200 flex items-center justify-center">
          <div class="absolute inset-0 bg-black/20 group-hover:bg-black/40 transition-all flex items-center justify-center">
            <span class="w-16 h-16 bg-white/90 rounded-full flex items-center justify-center text-indigo-600 shadow-xl pl-1">▶</span>
          </div>
          <p class="text-xs text-slate-500">Video: Cultural Day Highlights</p>
        </div>
        <div class="p-6">
          <span class="text-xs font-bold text-indigo-600 uppercase">Event • March 2026</span>
          <h4 class="font-bold text-lg mt-1">Inter-House Sports Highlights</h4>
        </div>
      </div>

      <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
        <img src="https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&w=600&q=80" class="h-60 w-full object-cover">
        <div class="p-6">
          <span class="text-xs font-bold text-indigo-600 uppercase">Classroom • Feb 2026</span>
          <h4 class="font-bold text-lg mt-1">Robotics Competition Finals</h4>
        </div>
      </div>

      </div>
  </main>

</body>
</html>
